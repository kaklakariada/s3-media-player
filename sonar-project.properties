sonar.projectKey=kaklakariada_s3-media-player
sonar.organization=kaklakariada-github

# Sources: infrastructure + new frontend (legacy frontend/ excluded)
sonar.sources=frontend2/src,infrastructure/lib,infrastructure/bin
sonar.tests=frontend2/src,infrastructure/test
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/*.d.ts

# Coverage (lcov produced by Vitest and Jest)
sonar.javascript.lcov.reportPaths=frontend2/coverage/lcov.info,infrastructure/coverage/lcov.info
